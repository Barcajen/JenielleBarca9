<!DOCTYPE html>



<html lang="en">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>Libu libong buwan</title>







<style>



*{



margin:0;



padding:0;



box-sizing:border-box;



}







body{



background:linear-gradient(135deg,#ff5f9e,#ffb6c1,#ffd6e7);



height:100vh;



overflow:hidden;



display:flex;



justify-content:center;



align-items:center;



font-family:Arial,sans-serif;



}







#lyrics{



color:white;



font-size:35px;



font-weight:bold;



text-align:center;



text-shadow:0 0 15px #ff1493;



padding:20px;



max-width:90%;



animation:fade 1s;



}







@keyframes fade{



from{opacity:0;transform:scale(.8);}



to{opacity:1;transform:scale(1);}



}







.heart{



position:fixed;



bottom:-30px;



font-size:25px;



animation:float 8s linear infinite;



color:#fff;



}







@keyframes float{



0%{



transform:translateY(0) rotate(0deg);



opacity:1;



}



100%{



transform:translateY(-110vh) rotate(360deg);



opacity:0;



}



}



</style>



</head>







<body>







<div id="lyrics">



I love you ❤️



</div>







<audio id="music" autoplay controls loop>



<source src="YOUR_MUSIC.mp3" type="audio/mpeg">



</audio>







<script>







// Ilagay ang sarili mong lyrics dito.



const lyrics = [

#loveHeart{

position:fixed;

left:50%;

bottom:70px;

transform:translateX(-50%);

font-size:90px;

z-index:999;

animation:heartbeat 1s infinite, bounce 1s infinite;

filter:drop-shadow(0 0 20px #ff0066);

}



@keyframes heartbeat{

0%,100%{

transform:translateX(-50%) scale(1);

}

25%{

transform:translateX(-50%) scale(1.25);

}

50%{

transform:translateX(-50%) scale(1);

}

75%{

transform:translateX(-50%) scale(1.25);

}

}



@keyframes bounce{

0%,100%{

bottom:70px;

}

50%{

bottom:110px;

}

}

  ["At kahit madalas na tayong", 0],



  ["'di magkasunduan", 2000],



  ["Ikaw pa rin ang uuwian", 4500],



  ["Mahal, ikaw ang uuwian", 8000],



  ["Baguhin man", 11500],



  ["ng libu-libong buwan", 13000],



  ["Ang kulay ng kalangitan,", 14600],



  ["Pangako ko,", 16100],



  ["hindi kita iiwan,", 17600],



  ["Pangako 'yan", 19000]



];







const text=document.getElementById("lyrics");



const music=document.getElementById("music");







music.addEventListener("play",()=>{







lyrics.forEach(line=>{



setTimeout(()=>{



text.innerHTML=line[0];



},line[1]);



});







});







function createHeart(){



const heart=document.createElement("div");



heart.className="heart";



heart.innerHTML="❤️";



heart.style.left=Math.random()*100+"vw";



heart.style.fontSize=(20+Math.random()*25)+"px";



heart.style.animationDuration=(5+Math.random()*5)+"s";



document.body.appendChild(heart);







setTimeout(()=>{



heart.remove();



},10000);



}







setInterval(createHeart,300);







</script>







</body>



</html>
